<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SparkFinder</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>✨ SparkFinder</h1>

<p>Find new friends with similar hobbies and interests!</p>

</header>

<div class="container">

<div class="card">

<h2>Create Your Profile</h2>

<input id="name" placeholder="Your Name">

<input id="studentClass" placeholder="Class (e.g. 1A)">

<input id="hobbies" placeholder="Hobbies">

<textarea id="bio" placeholder="Tell everyone about yourself"></textarea>

<button onclick="startApp()">
Create Profile
</button>

<!-- Your profile will appear here -->
<div id="profile"></div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
