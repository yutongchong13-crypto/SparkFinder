<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SparkFinder</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <h1>✨ SparkFinder</h1>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Friends</a>
        <a href="#">CCAs</a>
        <a href="#">Chat</a>
    </div>
</nav>

<section class="hero">

<h2>Find Your Spark ✨</h2>

<p>
Meet classmates with similar hobbies and interests.
</p>

</section>

<div class="container">

<div class="card">

<h2>Create Your Profile</h2>

<input id="name" placeholder="Full Name">

<input id="studentClass" placeholder="Class (e.g. 1A)">

<input id="hobbies" placeholder="Hobbies">

<input id="interests" placeholder="Interests">

<textarea id="bio" placeholder="Tell everyone about yourself"></textarea>

<button onclick="createProfile()">
Create Profile
</button>

</div>

<div id="profile"></div>

</div>

<script src="script.js"></script>

</body>

</html>
