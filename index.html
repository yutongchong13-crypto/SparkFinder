<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SparkFinder</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav>

    <h1>✨ SparkFinder</h1>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Friends</a>
        <a href="#">CCAs</a>
        <a href="#">Chat</a>
    </div>

</nav>

<section class="hero">

    <h2>Find Your Spark ✨</h2>

    <p>
        Meet classmates with similar hobbies and interests.
    </p>

</section>

<div class="container">

    <!-- Login Card -->

    <div class="card">

        <h2>Login</h2>

        <select id="loginUser">

            <option value="">Select Your Profile</option>

        </select>

        <button onclick="login()">
            Login
        </button>

    </div>

    <!-- Create Profile Card -->

    <div class="card">

        <h2>Create Your Profile</h2>

        <input id="name" placeholder="Full Name">

        <select id="studentClass">

            <option value="">Select Your Class</option>
            <option>1A</option>
            <option>1B</option>
            <option>1C</option>
            <option>1D</option>
            <option>1E</option>
            <option>1F</option>

        </select>

        <input id="hobbies" placeholder="Hobbies (e.g. Football, Gaming)">

        <input id="interests" placeholder="Interests (e.g. Coding, Music)">

        <textarea id="bio" placeholder="Tell everyone about yourself"></textarea>

        <button onclick="createProfile()">
            Create Profile
        </button>

        <button onclick="findMatches()">
            ❤️ Find My Matches
        </button>

    </div>

    <!-- Matches -->

    <div id="matches"></div>

    <!-- Profiles -->

    <div id="profile"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase.js"></script>

<script src="script.js"></script>

</body>

</html>
