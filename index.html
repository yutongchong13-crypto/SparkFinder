<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkFinder</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <h1>✨ SparkFinder</h1>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Friends</a>
        <a href="#">Chat</a>
    </div>
</nav>

<div class="container">

    <!-- Login -->

    <div class="card">

        <h2>Login</h2>

        <select id="loginUser">
            <option value="">Select Your Profile</option>
        </select>

        <button onclick="login()">
            Login
        </button>

    </div>

    <!-- Create Profile -->

    <div class="card">

        <h2>Create Profile</h2>

        <input
            id="name"
            placeholder="Full Name">

        <select id="studentClass">

            <option value="">Select Class</option>

            <option>1A</option>
            <option>1B</option>
            <option>1C</option>
            <option>1D</option>
            <option>1E</option>
            <option>1F</option>

        </select>

        <input
            id="hobbies"
            placeholder="Hobbies">

        <input
            id="interests"
            placeholder="Interests">

        <textarea
            id="bio"
            placeholder="Tell us about yourself"></textarea>

        <button onclick="createProfile()">
            Create Profile
        </button>

        <button onclick="findMatches()">
            ❤️ Find Matches
        </button>

        <button onclick="viewFriendRequests()">
            📩 Friend Requests
        </button>

    </div>

    <div id="matches"></div>

    <div id="profile"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="script.js"></script>

</body>
</html>
